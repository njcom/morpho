on:
  schedule:
    # At 06:00 on Thursday.
    - cron: '0 6 * * 4'
  workflow_dispatch:

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - name: 'Pull sources'
        uses: actions/checkout@v2

      - name: 'Install PHP'
        uses: shivammathur/setup-php@v2
        with:
          #todo: php-version: 8.1
          php-version: 8.0

      - name: 'Pull meta'
        run: |
          composer install
          make pull-meta

      - name: 'Push the changes'
        run: |
          .github/workflows/push-changes.sh task/pull-meta "Issue #7: Updated meta"
