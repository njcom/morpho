set -g default-terminal "screen-256color"

#set -g default-command /usr/bin/fish
#set -g default-shell /usr/bin/fish

# Prefix key: C-s
#set -g prefix C-s
#unbind C-b
#bind C-s send-prefix

# Act like vim
setw -g mode-keys vi

###############################################################################
# Panes and windows

set-window-option -g window-status-current-style bg=red

# Start windows and panes at 1, not 0 to switch them by Ctlr+s 1, Ctrl+s 2, etc, not by Ctrl+s 0 as default.
set -g base-index 1
setw -g pane-base-index 1

# Pane selection: prefix C-(h|j|k|l)
bind j select-pane -L
bind k select-pane -D
bind l select-pane -U
bind \; select-pane -R
# Use Alt-vim keys without prefix key to switch panes
#bind -n M-j select-pane -L
#bind -n M-k select-pane -D
#bind -n M-l select-pane -U
#bind -n M-\; select-pane -R

# Window selection with ???
#bind -r C-h select-window -t :-
#bind -r C-l select-window -t :+

# Split: prefix C-(s|v)
#bind v split-window -h # horizontal split
#bind s split-window -v # vertical split

bind s split-window -c "#{pane_current_path}" # horizontal split with setting path to $(pwd)
bind v split-window -h -c "#{pane_current_path}" # vertical split with setting path to $(pwd);

unbind '"'
unbind %

# Close pane: C-c
#bind c kill-pane

# https://superuser.com/questions/600286/move-pane-to-a-new-window-in-tmux
#bind-key j command-prompt -p "join pane from:"  "join-pane -s '%%'"
#bind-key s command-prompt -p "send pane to:"  "join-pane -t '%%'"

###############################################################################
# Copy mode

set-option -s escape-time 10

# Start copy mode: prefix Space
unbind '['
bind Space copy-mode

# then in copy-mode:

## Bindings for >= 2.4

# Select rectangle: prefix Space v
bind -T copy-mode-vi v send-keys -X begin-selection
# Select block: prefix Space C-v
bind -T copy-mode-vi 'C-v' send-keys -X rectangle-toggle
# Copy selection: select block or rectangle, y
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
# See ~/m/tech/tmux/src/key-bindings.c
unbind 'h'
bind -Tcopy-mode-vi j send -X cursor-left
bind -Tcopy-mode-vi k send -X cursor-down
bind -Tcopy-mode-vi l send -X cursor-up
bind -Tcopy-mode-vi \; send -X cursor-right

# Paste: prefix p
# works for both < 2.4 && >= 2.4
#unbind ']'
#bind p run "xclip -o -sel clip | tmux load-buffer - ; tmux paste-buffer"

###############################################################################
# Preserve environment variables

set-option -g update-environment 'LS_COLORS XDG_VTNR XDG_SESSION_ID XDG_SEAT XDG_RUNTIME_DIR DBUS_SESSION_BUS_ADDRESS GOPATH _JAVA_OPTIONS MAVEN_OPTS SAL_USE_VCLPLUGIN DISPLAY SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY'

